// HELPERS
// ═══════════════════════════════════════════

const KEY_DURATIONS = [1,2,3,5,7,10,15,20,25,30,45,60,90];
const fmt = (n) => n == null ? "\u2014" : "\u20AC" + n.toFixed(2);
const calcPpd = (eur, days) => days > 0 ? eur / days : 0;
const calcDelta = (hf, comp) => { if (hf == null || comp == null || comp === 0) return null; return ((hf - comp) / comp * 100).toFixed(1); };
const getHfPrice = (days) => { const m = HOLAFLY.find(p => p[0] === days); return m ? m[1] : null; };
const getCompPrice = (brand, days) => { const m = UNLIMITED[brand]?.find(p => p.days === days); return m ? m.eur : null; };
const getCheapestUnlimited = (days) => { let c = null; Object.values(UNLIMITED).forEach(plans => { const m = plans.find(p => p.days === days); if (m && (c === null || m.eur < c)) c = m.eur; }); return c; };
const getComparisonDurations = (expanded) => { const s = new Set(); if (expanded) HOLAFLY.forEach(p => s.add(p[0])); else HOLAFLY.forEach(p => { if (KEY_DURATIONS.includes(p[0])) s.add(p[0]); }); Object.values(UNLIMITED).forEach(plans => plans.forEach(p => s.add(p.days))); return [...s].sort((a, b) => a - b); };
const computeZones = () => { const exclusive = [], competitive = [], vulnerable = []; HOLAFLY.forEach(([days, eur]) => { const ch = getCheapestUnlimited(days); if (ch === null) exclusive.push(days); else { const d = parseFloat(calcDelta(eur, ch)); if (d >= 20) vulnerable.push(days); else competitive.push(days); } }); return { exclusive, competitive, vulnerable }; };

const thS = { padding: "8px 6px", textAlign: "center", fontSize: 11, fontWeight: 600, color: "#475569", borderBottom: "2px solid #e2e8f0", fontFamily: FONT };
const tdS = { padding: "7px 6px", textAlign: "center", fontSize: 11, fontFamily: FONT };

const DeltaBadge = ({ value }) => {
  if (value === null || value === undefined) return <span style={{ color: "#d1d5db", fontSize: 10 }}>{"\u2014"}</span>;
  const n = parseFloat(value);
  const color = n > 20 ? "#dc2626" : n > 10 ? "#ea580c" : n > 0 ? "#d97706" : n > -5 ? "#65a30d" : "#16a34a";
  const bg = n > 20 ? "#fef2f2" : n > 10 ? "#fff7ed" : n > 0 ? "#fffbeb" : n > -5 ? "#f7fee7" : "#f0fdf4";
  return <span style={{ fontSize: 9, fontWeight: 600, color, background: bg, padding: "2px 5px", borderRadius: 4, whiteSpace: "nowrap", display: "inline-block" }}>{n > 0 ? "\u25B2" : "\u25BC"} {Math.abs(n).toFixed(1)}%</span>;
};

const BrandDot = ({ brand }) => {
  const c = brand === "saily" ? COLORS.saily.dot : (COLORS[brand]?.primary || "#999");
  return <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: c, marginRight: 5, verticalAlign: "middle", border: brand === "saily" ? "1px solid #B8A000" : "none", boxSizing: "border-box" }} />;
};

const FrictionBadge = ({ level }) => {
  const s = { HIGH: { c: "#dc2626", bg: "#fef2f2", l: "High" }, MEDIUM: { c: "#d97706", bg: "#fffbeb", l: "Medium" }, LOW: { c: "#16a34a", bg: "#f0fdf4", l: "Low" } }[level] || { c: "#16a34a", bg: "#f0fdf4", l: "Low" };
  return <span style={{ fontSize: 9, fontWeight: 600, color: s.c, background: s.bg, padding: "2px 6px", borderRadius: 4 }}>{s.l}</span>;
};

function ZoneCard({ title, days, color, bg }) {
  if (!days || !days.length) return null;
  const sorted = [...days].sort((a, b) => a - b);
  const ranges = []; let st = sorted[0], en = sorted[0];
  for (let i = 1; i < sorted.length; i++) { if (sorted[i] === en + 1) en = sorted[i]; else { ranges.push(st === en ? st + "d" : st + "-" + en + "d"); st = en = sorted[i]; } }
  ranges.push(st === en ? st + "d" : st + "-" + en + "d");
  return (
    <div style={{ flex: 1, minWidth: 120, padding: "10px 12px", borderRadius: 8, background: bg, border: "1px solid " + color + "22", fontFamily: FONT }}>
      <div style={{ fontSize: 10, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>{title}</div>
      <div style={{ fontSize: 11, color: "#334155" }}>{ranges.join(", ")}</div>
      <div style={{ fontSize: 10, color: "#64748b", marginTop: 2 }}>{days.length} dur.</div>
    </div>
  );
}

        <div style={{ fontSize: 11, color: "#475569", lineHeight: 1.6 }}>{t.localCustText}</div>
      </div>
      <div style={{ fontSize: 11, fontWeight: 600, color: "#475569", marginBottom: 4, fontFamily: FONT }}>{t.localTableTitle}</div>
      <div style={{ fontSize: 10, color: "#92400e", background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 6, padding: "6px 10px", marginBottom: 8, fontFamily: FONT }}>{t.localWarning}</div>
      <div style={{ overflowX: "auto", marginBottom: 20 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, fontFamily: FONT }}>
          <thead><tr>
            <th style={{ ...thS, textAlign: "left", minWidth: 70 }}>Provider</th>
            <th style={{ ...thS, textAlign: "left", minWidth: 80 }}>Plan</th>
            <th style={thS}>Data</th>
            <th style={thS}>Days</th>
            <th style={thS}>THB</th>
            <th style={thS}>EUR</th>
            <th style={{ ...thS, background: COLORS.holafly.bg }}>Holafly</th>
            <th style={thS}>Delta</th>
            <th style={thS}>Friction</th>
          </tr></thead>
          <tbody>
            {LOCAL_OPS.map((op, i) => {
              const isU = op.dataGb === "Unlimited";
              const hfMatch = HOLAFLY.reduce((best, [d, e]) => !best ? [d, e] : Math.abs(d - op.validity) < Math.abs(best[0] - op.validity) ? [d, e] : best, null);
              const delta = hfMatch && op.eur > 0 ? calcDelta(hfMatch[1], op.eur) : null;
              const bk = LOCAL_BRAND_KEY[op.provider];
              return (
                <tr key={i} style={{ background: i % 2 === 0 ? "#fff" : "#f8fafc", borderBottom: "1px solid #f1f5f9", borderLeft: isU ? "3px solid #7c3aed" : "3px solid transparent" }}>
                  <td style={{ ...tdS, textAlign: "left", fontWeight: 600 }}>{bk && COLORS[bk] && <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: COLORS[bk].primary, marginRight: 5, verticalAlign: "middle" }} />}{op.provider}</td>
                  <td style={{ ...tdS, textAlign: "left", fontSize: 10 }}>{op.plan}</td>
                  <td style={{ ...tdS, fontSize: 9, fontWeight: 600, color: isU ? "#7c3aed" : "#64748b" }}>{isU ? "\u221E" : op.dataGb + " GB"}</td>
                  <td style={tdS}>{op.validity}d</td>
                  <td style={{ ...tdS, fontSize: 10, color: "#64748b" }}>{op.thb}</td>
                  <td style={{ ...tdS, fontWeight: 600 }}>{fmt(op.eur)}</td>
                  <td style={{ ...tdS, fontWeight: 600, background: i % 2 === 0 ? COLORS.holafly.bg + "66" : COLORS.holafly.bg + "33" }}>{hfMatch ? <span>{fmt(hfMatch[1])} <span style={{ fontSize: 9, color: "#94a3b8" }}>({hfMatch[0]}d)</span></span> : "\u2014"}</td>
                  <td style={tdS}>{delta !== null ? <DeltaBadge value={delta} /> : "\u2014"}</td>
                  <td style={tdS}><FrictionBadge level={op.friction} /></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 20, fontStyle: "italic", fontFamily: FONT }}>{"Delta = (Holafly - Local) / Local \u00D7 100. Purple border = unlimited. FX: 1\u20AC = " + FX_THB + " THB."}</div>
      <PriceCurveChart t={t} showLocal={true} />
      <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 10, padding: "16px 20px", marginBottom: 20, fontFamily: FONT }}>
        <h3 style={{ fontSize: 13, fontWeight: 700, color: "#0f172a", margin: "0 0 10px 0" }}>{t.localRisks}</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <div>
            <div style={{ fontSize: 10, fontWeight: 600, color: "#dc2626", textTransform: "uppercase", marginBottom: 8 }}>Risks</div>
            <div style={{ fontSize: 11, color: "#475569", lineHeight: 1.7, marginBottom: 8 }}>{t.localRisk1}</div>
            <div style={{ fontSize: 11, color: "#475569", lineHeight: 1.7 }}>{t.localRisk2}</div>
          </div>
          <div>
            <div style={{ fontSize: 10, fontWeight: 600, color: "#059669", textTransform: "uppercase", marginBottom: 8 }}>Opportunities</div>
            <div style={{ fontSize: 11, color: "#475569", lineHeight: 1.7, marginBottom: 8 }}>{t.localOpp1}</div>
            <div style={{ fontSize: 11, color: "#475569", lineHeight: 1.7 }}>{t.localOpp2}</div>
          </div>
        </div>
      </div>
      <MethodNotes t={t} />
    </div>
  );
}

// ═══════════════════════════════════════════
// SHARED: PPD CHART
// ═══════════════════════════════════════════

const COMP_STYLES = {
  airalo: { color: COLORS.airalo.primary, dash: "none", label: "Airalo (3GB/d)" },
  saily: { color: "#B8A000", dash: "8,4", label: "Saily (5GB/d)" },
  nomad: { color: COLORS.nomad.primary, dash: "4,3", label: "Nomad (2GB/d)" },
  yesim: { color: COLORS.yesim.primary, dash: "2,3", label: "Yesim (no FUP)" },
};
const LOCAL_CHART = {
  "AIS": { color: COLORS.ais.primary, dash: "3,2", label: "AIS (local)" },
  "TrueMove H": { color: COLORS.truemove.primary, dash: "6,3", label: "TrueMove H" },
  "dtac": { color: COLORS.dtac.primary, dash: "4,2", label: "dtac" },
};

function PriceCurveChart({ t, showLocal }) {
  const W = 720, H = 320, PAD = { top: 30, right: 155, bottom: 40, left: 55 };
  const pW = W-PAD.left-PAD.right, pH = H-PAD.top-PAD.bottom;
  const hfD = HOLAFLY.map(([d, e]) => ({ days: d, ppd: calcPpd(e, d) }));
  const cL = {}; Object.entries(UNLIMITED).forEach(([b, pl]) => { if (COMP_STYLES[b]) cL[b] = pl.map(p => ({ days: p.days, ppd: calcPpd(p.eur, p.days) })).sort((a, b2) => a.days - b2.days); });
  const lL = {};
  if (showLocal) { LOCAL_OPS.forEach(op => { if (op.dataGb !== "Unlimited") return; const s = LOCAL_CHART[op.provider]; if (!s) return; if (!lL[op.provider]) lL[op.provider] = []; if (!lL[op.provider].find(d => d.days === op.validity)) lL[op.provider].push({ days: op.validity, ppd: calcPpd(op.eur, op.validity) }); }); Object.values(lL).forEach(a => a.sort((x, y) => x.days - y.days)); }
  const allP = [...hfD.map(d => d.ppd), ...Object.values(cL).flatMap(l => l.map(d => d.ppd)), ...Object.values(lL).flatMap(l => l.map(d => d.ppd))];
  const mxD = Math.max(...hfD.map(d => d.days)), mxP = Math.max(...allP) * 1.1;
  const x = d => PAD.left + (d/mxD)*pW, y = p => PAD.top + pH - (p/mxP)*pH;
  const poly = data => data.map(d => x(d.days).toFixed(1)+","+y(d.ppd).toFixed(1)).join(" ");
  const gL = [0,1,2,3,4,5,6].map(i => mxP*i/6).filter(v => v <= mxP);
  const dT = [1,5,10,15,20,30,45,60,90].filter(d => d <= mxD);
  const legend = [{ label: "Holafly (12GB/d)", color: COLORS.holafly.primary, dash: "" }, ...Object.entries(COMP_STYLES).map(([,s]) => s), ...(showLocal ? Object.entries(LOCAL_CHART).map(([,s]) => s) : [])];
  return (
    <div style={{ marginBottom: 20 }}>
      <h3 style={{ fontSize: 13, fontWeight: 700, color: "#1e293b", marginBottom: 4, fontFamily: FONT }}>{t.ppdTitle}</h3>
      <div style={{ fontSize: 10, color: "#64748b", marginBottom: 10, fontFamily: FONT }}>{t.ppdSubtitle}</div>
      <div style={{ overflowX: "auto" }}>
        <svg viewBox={"0 0 "+W+" "+H} style={{ width: "100%", maxWidth: W, background: "#fafafa", borderRadius: 8, border: "1px solid #e2e8f0" }}>
          {gL.map((v, i) => <g key={i}><line x1={PAD.left} y1={y(v)} x2={W-PAD.right} y2={y(v)} stroke="#e2e8f0" strokeWidth={0.5} /><text x={PAD.left-6} y={y(v)+3} textAnchor="end" fontSize={9} fill="#94a3b8" fontFamily={FONT}>{"\u20AC"}{v.toFixed(2)}</text></g>)}
          {dT.map(d => <text key={d} x={x(d)} y={H-10} textAnchor="middle" fontSize={9} fill="#94a3b8" fontFamily={FONT}>{d}d</text>)}
          <polyline points={poly(hfD)} fill="none" stroke={COLORS.holafly.primary} strokeWidth={2.5} />
          {Object.entries(cL).map(([b, data]) => { const s = COMP_STYLES[b]; return <polyline key={b} points={poly(data)} fill="none" stroke={s.color} strokeWidth={1.5} strokeDasharray={s.dash} />; })}
          {Object.entries(cL).map(([b, data]) => data.map((d, i) => <circle key={b+"-"+i} cx={x(d.days)} cy={y(d.ppd)} r={3} fill={COMP_STYLES[b].color} />))}
          {showLocal && Object.entries(lL).map(([prov, data]) => { const s = LOCAL_CHART[prov]; return <g key={prov}><polyline points={poly(data)} fill="none" stroke={s.color} strokeWidth={1.5} strokeDasharray={s.dash} />{data.map((d, i) => <circle key={i} cx={x(d.days)} cy={y(d.ppd)} r={3} fill={s.color} />)}</g>; })}
          {legend.map((item, i) => <g key={i} transform={"translate("+(W-PAD.right+12)+", "+(PAD.top+i*16)+")"}><line x1={0} y1={4} x2={18} y2={4} stroke={item.color} strokeWidth={2} strokeDasharray={item.dash || "none"} /><text x={22} y={7} fontSize={9} fill="#475569" fontFamily={FONT}>{item.label}</text></g>)}
          <text x={PAD.left+pW/2} y={H} textAnchor="middle" fontSize={10} fill="#64748b" fontFamily={FONT}>Duration (days)</text>
          <text x={12} y={PAD.top+pH/2} textAnchor="middle" fontSize={10} fill="#64748b" fontFamily={FONT} transform={"rotate(-90, 12, "+(PAD.top+pH/2)+")"}>{"\u20AC/day"}</text>
        </svg>
      </div>
      <div style={{ fontSize: 10, color: "#64748b", marginTop: 8, fontFamily: FONT, lineHeight: 1.5 }}>{t.ppdFooter}</div>
    </div>
  );
}

// ═══════════════════════════════════════════
// SHARED: METHOD NOTES

function MethodNotes({ t }) {
  return (
    <div style={{ padding: 14, background: "#f8fafc", borderRadius: 8, border: "1px solid #e2e8f0", fontFamily: FONT }}>
      <div style={{ fontSize: 10, fontWeight: 600, color: "#475569", marginBottom: 4 }}>{t.methodTitle}</div>

}

      <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>

}

ReactDOM.render(<App />, document.getElementById("root"));
